<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <figure>
            <img
                src="/public/pictures/irasutoya_tech_support.png"
                alt="Tech support lady working. She's looking at her computer and talking to someone over call."
                style="width: 50%;"
            >
            <figcaption><h1>Hi, nerd!</h1></figcaption>
        </figure>

        <form action="/login" method="POST" class="window">
            <div>
                <label for="email">Email</label>
                <input
                    type="email" 
                    id="email" 
                    name="email" 
                    autocomplete="email" 
                    required
                >
            </div>

            <div>
                <label for="password">Password</label>
                <input
                    type="password" 
                    id="password" 
                    name="password" 
                    autocomplete="current-password" 
                    required
                >
            </div>

            <button type="submit">Log in</button>
        </form>
    </main>

    {{ footer.html }}
</body>
<link rel="stylesheet" href="/public/css/global.css">
<style>

body {
    display: flex;
    flex-direction: column;

    align-items: center;
    justify-content: center;

    width: 100vw;
    min-height: 100vh;
}

main {
    width: 50%;
    height: 100vh;

    display: flex;
    flex-direction: column;

    justify-content: center;
}

</style>
</html>
